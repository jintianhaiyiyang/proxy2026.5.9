<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Proxy Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader-ring { 
            border-top-color: #4f46e5; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 flex flex-col h-screen overflow-hidden text-gray-800 antialiased">
    
    <header class="bg-white shadow border-b border-gray-200 p-3 flex items-center justify-between z-10 shrink-0">
        <div class="flex items-center gap-2 text-indigo-600 font-black text-xl tracking-tight">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
            OmniProxy
        </div>
        <form id="proxy-form" class="flex-1 max-w-4xl mx-6 relative">
            <input id="url-input" type="url" required placeholder="输入目标网址 (例如: https://news.ycombinator.com)" class="w-full pl-5 pr-28 py-2.5 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all shadow-inner text-sm bg-gray-50 hover:bg-white" />
            <button type="submit" class="absolute right-1 top-1 bottom-1 px-6 bg-indigo-600 hover:bg-indigo-700 text-white rounded-md font-semibold text-sm transition-colors shadow-sm">
                安全访问
            </button>
        </form>
        <div class="flex items-center gap-3">
            <span id="status-badge" class="px-3 py-1 rounded-md bg-gray-100 border border-gray-200 text-xs font-bold text-gray-500 uppercase tracking-wide">IDLE</span>
        </div>
    </header>

    <main class="flex-1 relative bg-white w-full h-full">
        <div id="loading-overlay" class="hidden absolute inset-0 bg-white/90 backdrop-blur-sm z-20 flex flex-col items-center justify-center">
            <div class="loader-ring rounded-full border-4 border-gray-200 h-14 w-14 mb-4"></div>
            <p class="text-gray-700 font-semibold tracking-wide">正在解析目标域及重写网络链路...</p>
        </div>

        <div id="error-panel" class="hidden absolute inset-0 z-20 bg-gray-50 flex flex-col items-center justify-center p-8 text-center">
            <div class="bg-red-100 p-4 rounded-full mb-4">
                <svg class="w-12 h-12 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            </div>
            <h3 class="text-2xl font-black text-gray-900 mb-2">链路阻断</h3>
            <p id="error-message" class="text-gray-600 max-w-lg mx-auto mb-6 text-sm">由于目标站点的安全策略或代理节点阻断，请求未能完成。</p>
            <button onclick="document.getElementById('error-panel').classList.add('hidden')" class="px-8 py-2.5 bg-gray-900 hover:bg-gray-800 text-white rounded-lg font-medium transition-colors">关闭面板</button>
        </div>

        <iframe id="proxy-frame" class="w-full h-full border-0" sandbox="allow-same-origin allow-scripts allow-forms allow-popups"></iframe>
    </main>

    <script>
        /**
         * 生产级前端代理控制器 (Production Proxy Controller)
         * 基于 SOLID 原则设计，分离 UI 状态、网络调度与 DOM 解析逻辑。
         */
        class ProxyEngine {
            constructor() {
                this.elements = {
                    form: document.getElementById('proxy-form'),
                    input: document.getElementById('url-input'),
                    frame: document.getElementById('proxy-frame'),
                    loader: document.getElementById('loading-overlay'),
                    errorPanel: document.getElementById('error-panel'),
                    errorMsg: document.getElementById('error-message'),
                    statusBadge: document.getElementById('status-badge')
                };
                
                // CORS 代理节点集群 (具备降级与容灾机制)
                this.proxyNodes = [
                    (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
                    (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
                ];

                this._initEventListeners();
            }

            _initEventListeners() {
                // 主表单提交拦截
                this.elements.form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    let targetUrl = this.elements.input.value.trim();
                    if (!targetUrl.startsWith('http')) {
                        targetUrl = 'https://' + targetUrl;
                        this.elements.input.value = targetUrl;
                    }
                    this.execute(targetUrl);
                });

                // 监听子 iframe 回传的路由事件，实现代理域内的闭环流转
                window.addEventListener('message', (event) => {
                    if (event.data && event.data.type === 'PROXY_ROUTING') {
                        this.elements.input.value = event.data.url;
                        this.execute(event.data.url);
                    }
                });
            }

            _updateStatus(state, type) {
                const badge = this.elements.statusBadge;
                badge.textContent = state;
                const baseClass = 'px-3 py-1 rounded-md text-xs font-bold uppercase tracking-wide border';
                const typeClasses = {
                    info: 'bg-indigo-50 border-indigo-200 text-indigo-700',
                    success: 'bg-emerald-50 border-emerald-200 text-emerald-700',
                    error: 'bg-rose-50 border-rose-200 text-rose-700'
                };
                badge.className = `${baseClass} ${typeClasses[type] || typeClasses.info}`;
            }

            /**
             * 执行核心网络请求与故障转移调度
             */
            async execute(url) {
                this.elements.loader.classList.remove('hidden');
                this.elements.errorPanel.classList.add('hidden');
                this._updateStatus('Routing...', 'info');

                let htmlPayload = null;
                let lastError = '';

                // 轮询代理节点，防御单点故障
                for (let i = 0; i < this.proxyNodes.length; i++) {
                    const endpoint = this.proxyNodes[i](url);
                    try {
                        const response = await fetch(endpoint, {
                            method: 'GET',
                            headers: { 'Accept': 'text/html,application/xhtml+xml' },
                            signal: AbortSignal.timeout(15000) // 15秒超时控制，防止僵死
                        });
                        
                        if (response.ok) {
                            htmlPayload = await response.text();
                            break; 
                        } else {
                            lastError = `Node ${i + 1} 返回状态码 HTTP ${response.status}`;
                        }
                    } catch (error) {
                        lastError = `Node ${i + 1} 网络链路断开`;
                    }
                }

                if (htmlPayload) {
                    this._processAndInjectDOM(htmlPayload, url);
                } else {
                    this._triggerError(`链路彻底阻断。详细信息: ${lastError}。请检查目标站点的反爬虫与跨域安全策略。`);
                }
            }

            /**
             * 深度解析与重写内存中的 DOM 树，切断恶意跳出并修正资源定位
             */
            _processAndInjectDOM(rawHtml, baseUrl) {
                try {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(rawHtml, 'text/html');

                    // 1. 强制注入 Base href，修正子页面内所有相对路径 (图片/CSS/JS)
                    let baseEl = doc.querySelector('base');
                    if (!baseEl) {
                        baseEl = doc.createElement('base');
                        doc.head.insertBefore(baseEl, doc.head.firstChild);
                    }
                    baseEl.href = baseUrl;

                    // 2. 注入全局劫持脚本 (Hooking)
                    const injectionScript = doc.createElement('script');
                    injectionScript.textContent = `
                        // 拦截标准导航行为
                        document.addEventListener('click', function(e) {
                            const anchor = e.target.closest('a');
                            if (anchor && anchor.href && !anchor.href.startsWith('javascript:')) {
                                e.preventDefault();
                                window.parent.postMessage({ type: 'PROXY_ROUTING', url: anchor.href }, '*');
                            }
                        }, true);

                        // 拦截原生表单提交，防止跨域重载导致脱离代理环境
                        document.addEventListener('submit', function(e) {
                            e.preventDefault();
                            console.warn('[OmniProxy] 为维持代理状态，已阻断原生表单提交。');
                        });
                    `;
                    doc.head.appendChild(injectionScript);

                    // 3. 将净化与重写后的 DOM 序列化并推送至 iframe 的源协议中
                    this.elements.frame.srcdoc = doc.documentElement.outerHTML;
                    
                    this._updateStatus('Connected', 'success');
                    this.elements.loader.classList.add('hidden');

                } catch (error) {
                    this._triggerError(`DOM 构建与解析阶段发生崩溃: ${error.message}`);
                }
            }

            _triggerError(message) {
                this.elements.loader.classList.add('hidden');
                this.elements.errorPanel.classList.remove('hidden');
                this.elements.errorMsg.textContent = message;
                this._updateStatus('Failed', 'error');
            }
        }

        // 启动系统生命周期
        document.addEventListener('DOMContentLoaded', () => {
            new ProxyEngine();
        });
    </script>
</body>
</html>
